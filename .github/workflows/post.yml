name: X Auto Post Bot

on:
  schedule:
    - cron: '14 21 * * *'  # JST 06:14
    - cron: '30 21 * * *'  # JST 06:30
    - cron: '43 21 * * *'  # JST 06:43
    - cron: '55 21 * * *'  # JST 06:55
    - cron: '8 22 * * *'  # JST 07:08
    - cron: '23 22 * * *'  # JST 07:23
    - cron: '38 22 * * *'  # JST 07:38
    - cron: '52 22 * * *'  # JST 07:52
    - cron: '9 23 * * *'  # JST 08:09
    - cron: '22 23 * * *'  # JST 08:22
    - cron: '34 23 * * *'  # JST 08:34
    - cron: '51 23 * * *'  # JST 08:51
    - cron: '7 2 * * *'  # JST 11:07
    - cron: '55 2 * * *'  # JST 11:55
    - cron: '31 3 * * *'  # JST 12:31
    - cron: '53 3 * * *'  # JST 12:53
    - cron: '10 8 * * *'  # JST 17:10
    - cron: '45 8 * * *'  # JST 17:45
    - cron: '19 9 * * *'  # JST 18:19
    - cron: '52 9 * * *'  # JST 18:52
    - cron: '5 10 * * *'  # JST 19:05
    - cron: '20 10 * * *'  # JST 19:20
    - cron: '45 10 * * *'  # JST 19:45
    - cron: '6 11 * * *'  # JST 20:06
    - cron: '30 11 * * *'  # JST 20:30
    - cron: '47 11 * * *'  # JST 20:47
    - cron: '38 12 * * *'  # JST 21:38
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
