# ============================================================
# 運用方針：
# - 定期投稿はすべて diagram モード
# - 手動実行も diagram モード
# - 投稿時刻はJST固定
# - 1日30回だけ投稿トライ
# - SNSピーク時間帯に投稿を集中
# - ランダムスケジュール生成なし
# - ランダム投稿数なし
# - linkモードなし
# - test投稿なし
# - post.ymlの自動書き換えなし
# ============================================================

name: X Auto Post Bot

on:
  schedule:
    - cron: '7 22 * * *'   # JST 07:07
    - cron: '27 22 * * *'  # JST 07:27
    - cron: '47 22 * * *'  # JST 07:47
    - cron: '7 23 * * *'   # JST 08:07
    - cron: '27 23 * * *'  # JST 08:27
    - cron: '47 23 * * *'  # JST 08:47
    - cron: '7 0 * * *'    # JST 09:07
    - cron: '27 0 * * *'   # JST 09:27
    - cron: '37 2 * * *'   # JST 11:37
    - cron: '57 2 * * *'   # JST 11:57
    - cron: '17 3 * * *'   # JST 12:17
    - cron: '37 3 * * *'   # JST 12:37
    - cron: '57 3 * * *'   # JST 12:57
    - cron: '17 4 * * *'   # JST 13:17
    - cron: '7 8 * * *'    # JST 17:07
    - cron: '27 8 * * *'   # JST 17:27
    - cron: '47 8 * * *'   # JST 17:47
    - cron: '7 9 * * *'    # JST 18:07
    - cron: '27 9 * * *'   # JST 18:27
    - cron: '47 9 * * *'   # JST 18:47
    - cron: '7 11 * * *'   # JST 20:07
    - cron: '27 11 * * *'  # JST 20:27
    - cron: '47 11 * * *'  # JST 20:47
    - cron: '7 12 * * *'   # JST 21:07
    - cron: '27 12 * * *'  # JST 21:27
    - cron: '47 12 * * *'  # JST 21:47
    - cron: '7 13 * * *'   # JST 22:07
    - cron: '27 13 * * *'  # JST 22:27
    - cron: '47 13 * * *'  # JST 22:47
    - cron: '17 14 * * *'  # JST 23:17

  workflow_dispatch:

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Post diagram to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py diagram

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
