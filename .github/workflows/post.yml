name: X Auto Post Bot

on:
  schedule:
    - cron: '15 21 * * *'
    - cron: '26 21 * * *'
    - cron: '34 21 * * *'
    - cron: '35 21 * * *'
    - cron: '56 21 * * *'
    - cron: '57 21 * * *'
    - cron: '17 22 * * *'
    - cron: '41 22 * * *'
    - cron: '44 22 * * *'
    - cron: '48 22 * * *'
    - cron: '4 23 * * *'
    - cron: '5 23 * * *'
    - cron: '59 23 * * *'
    - cron: '0 2 * * *'
    - cron: '3 3 * * *'
    - cron: '31 3 * * *'
    - cron: '38 3 * * *'
    - cron: '2 8 * * *'
    - cron: '5 8 * * *'
    - cron: '26 8 * * *'
    - cron: '17 10 * * *'
    - cron: '43 10 * * *'
    - cron: '0 11 * * *'
    - cron: '1 11 * * *'
    - cron: '5 11 * * *'
    - cron: '10 11 * * *'
    - cron: '39 11 * * *'
    - cron: '25 12 * * *'
    - cron: '43 12 * * *'
    - cron: '46 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "21" ] || [ "$HOUR" = "22" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
