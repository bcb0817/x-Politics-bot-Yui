name: post

# 運用方針:
# - 30分おき（毎時 07分・37分）に起動し、投稿可否は Python(post.py) 側で JST 現在時刻を見て判定する
# - 24時間対象。時間帯（深夜・早朝）によるスキップはしない（1日48回の投稿トライ）
# - GitHub Actions の cron は UTC 基準だが「分」指定は JST でも同じ値なので、毎時07分・37分に走る
# - cron 時刻そのものは投稿判定の根拠にせず、POST_WINDOW_MINUTES(既定20分)で遅延を吸収する
# - 定期投稿・手動実行ともに diagram モード固定（link / test / normal / dry-run は廃止）

on:
  schedule:
    # 毎時 07分・37分（1日48回）。GitHub の仕様上、複数分の1行指定より
    # 2行に分けた方が発火が安定しやすい。分指定は JST/UTC で同値。
    - cron: '7 * * * *'
    - cron: '37 * * * *'
  workflow_dispatch:
    # 手動強制投稿用。FORCE_POST=true のときだけスロット判定を無視して diagram 投稿する。
    inputs:
      force_post:
        description: 'Force post now (ignore post window). diagram only.'
        type: boolean
        required: false
        default: false
      force_bypass_score:
        description: 'Also bypass score gate (only effective with force_post=true).'
        type: boolean
        required: false
        default: false

concurrency:
  # 起動が重ならないようにする（重複投稿の保険）
  group: post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TZ: Asia/Tokyo
      # 30分スロットに対し、GitHub Actions の遅延を20分まで吸収する（現在slot判定用）
      POST_WINDOW_MINUTES: "20"
      # schedule発火が落ちても過去24時間の未処理slotをcatch-upする
      CATCH_UP_HOURS: "24"
      # 連投・Bot臭を避けるため1runの投稿トライは最大1件
      MAX_POSTS_PER_RUN: "1"
      # 24時間トライ。外部時刻APIに依存せず Actions 上の時刻(JST)を使う
      DISABLE_TIME_API: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Japanese fonts (for diagram image)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # requirements.txt が不完全でも必ず動くよう、必須依存を確実に導入する
          pip install tweepy anthropic pillow requests feedparser

      # --- デバッグ：schedule コンテキストを出力 ------------------------------
      - name: Debug schedule context
        env:
          FORCE_POST: ${{ inputs.force_post }}
          FORCE_BYPASS_SCORE: ${{ inputs.force_bypass_score }}
          MIN_POST_SCORE: "6.3"
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "UTC now=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "JST now=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"
          echo "FORCE_POST=${FORCE_POST:-}"
          echo "FORCE_BYPASS_SCORE=${FORCE_BYPASS_SCORE:-}"
          echo "MIN_POST_SCORE=${MIN_POST_SCORE:-}"
          echo "POST_WINDOW_MINUTES=${POST_WINDOW_MINUTES:-}"
          echo "CATCH_UP_HOURS=${CATCH_UP_HOURS:-}"
          echo "MAX_POSTS_PER_RUN=${MAX_POSTS_PER_RUN:-}"
          echo "DIAGRAM_PRESET=${DIAGRAM_PRESET:-}"
          echo "DISABLE_TIME_API=${DISABLE_TIME_API:-}"

      # --- キャッシュ復元 -----------------------------------------------------
      - name: Restore posted slots cache
        uses: actions/cache/restore@v4
        with:
          path: src/posted_slots.json
          key: posted-slots-${{ github.run_id }}
          restore-keys: |
            posted-slots-

      - name: Restore posted urls cache
        uses: actions/cache/restore@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      # --- 投稿 ---------------------------------------------------------------
      - name: Post diagram to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_POST: ${{ inputs.force_post }}
          FORCE_BYPASS_SCORE: ${{ inputs.force_bypass_score }}
          # 投稿可否の最終しきい値（effective_score >= MIN_POST_SCORE で投稿）
          MIN_POST_SCORE: "6.3"
        run: |
          cd src
          python post.py diagram

      # --- キャッシュ保存 -----------------------------------------------------
      - name: Save posted slots cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_slots.json
          key: posted-slots-${{ github.run_id }}

      - name: Save posted urls cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
