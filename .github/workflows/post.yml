name: X Auto Post Bot

on:
  schedule:
    - cron: '9 21 * * *'
    - cron: '15 21 * * *'
    - cron: '22 21 * * *'
    - cron: '31 21 * * *'
    - cron: '38 21 * * *'
    - cron: '52 21 * * *'
    - cron: '8 22 * * *'
    - cron: '16 22 * * *'
    - cron: '26 22 * * *'
    - cron: '31 22 * * *'
    - cron: '51 22 * * *'
    - cron: '8 23 * * *'
    - cron: '25 23 * * *'
    - cron: '42 2 * * *'
    - cron: '8 3 * * *'
    - cron: '17 3 * * *'
    - cron: '25 3 * * *'
    - cron: '21 8 * * *'
    - cron: '30 8 * * *'
    - cron: '4 9 * * *'
    - cron: '9 9 * * *'
    - cron: '14 9 * * *'
    - cron: '45 9 * * *'
    - cron: '50 9 * * *'
    - cron: '13 10 * * *'
    - cron: '29 10 * * *'
    - cron: '36 10 * * *'
    - cron: '28 11 * * *'
    - cron: '44 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "21" ] || [ "$HOUR" = "22" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
