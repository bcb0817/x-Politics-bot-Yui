name: X Auto Post Bot

on:
  schedule:
    - cron: '14 21 * * *'
    - cron: '21 21 * * *'
    - cron: '51 21 * * *'
    - cron: '7 22 * * *'
    - cron: '16 22 * * *'
    - cron: '46 22 * * *'
    - cron: '7 23 * * *'
    - cron: '15 23 * * *'
    - cron: '20 23 * * *'
    - cron: '33 23 * * *'
    - cron: '53 23 * * *'
    - cron: '52 2 * * *'
    - cron: '39 3 * * *'
    - cron: '54 3 * * *'
    - cron: '7 8 * * *'
    - cron: '43 8 * * *'
    - cron: '55 8 * * *'
    - cron: '1 9 * * *'
    - cron: '25 9 * * *'
    - cron: '33 9 * * *'
    - cron: '30 10 * * *'
    - cron: '40 10 * * *'
    - cron: '0 11 * * *'
    - cron: '8 12 * * *'
    - cron: '23 12 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "21" ] || [ "$HOUR" = "22" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
