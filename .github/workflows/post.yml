name: post

# 運用方針:
# - 10分おきに起動し、投稿可否は Python(post.py) 側で JST 現在時刻を見て判定する
# - GitHub Actions の cron は UTC 基準かつ数分〜十数分の遅延があるため、
#   cron 時刻そのものを投稿判定の根拠にしない
# - 定期投稿・手動実行ともに diagram モード固定（link / test / random は廃止）

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # 手動強制投稿用。FORCE_POST=true のときだけ時刻判定を無視して diagram 投稿する。
    inputs:
      force_post:
        description: 'Force post now (ignore time window). diagram only.'
        type: boolean
        required: false
        default: false

concurrency:
  # 10分おきの起動が重ならないようにする（重複投稿の保険）
  group: post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Japanese fonts (for diagram image)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install tweepy anthropic pillow requests feedparser
          fi

      # --- キャッシュ復元 -----------------------------------------------------
      - name: Restore posted slots cache
        uses: actions/cache@v4
        with:
          path: src/posted_slots.json
          key: posted-slots-${{ github.run_id }}
          restore-keys: |
            posted-slots-

      - name: Restore posted urls cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      # --- 投稿 ---------------------------------------------------------------
      - name: Post diagram to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_POST: ${{ inputs.force_post }}
        run: |
          cd src
          python post.py diagram

      # --- キャッシュ保存 -----------------------------------------------------
      - name: Save posted slots cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_slots.json
          key: posted-slots-${{ github.run_id }}

      - name: Save posted urls cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
