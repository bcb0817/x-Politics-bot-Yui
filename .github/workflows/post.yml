name: X Auto Post Bot

on:
  schedule:
    - cron: '7 21 * * *'  # JST 06:07
    - cron: '21 21 * * *'  # JST 06:21
    - cron: '38 21 * * *'  # JST 06:38
    - cron: '56 21 * * *'  # JST 06:56
    - cron: '13 22 * * *'  # JST 07:13
    - cron: '26 22 * * *'  # JST 07:26
    - cron: '40 22 * * *'  # JST 07:40
    - cron: '53 22 * * *'  # JST 07:53
    - cron: '12 23 * * *'  # JST 08:12
    - cron: '25 23 * * *'  # JST 08:25
    - cron: '40 23 * * *'  # JST 08:40
    - cron: '53 23 * * *'  # JST 08:53
    - cron: '9 2 * * *'  # JST 11:09
    - cron: '47 2 * * *'  # JST 11:47
    - cron: '22 3 * * *'  # JST 12:22
    - cron: '44 3 * * *'  # JST 12:44
    - cron: '6 8 * * *'  # JST 17:06
    - cron: '27 8 * * *'  # JST 17:27
    - cron: '48 8 * * *'  # JST 17:48
    - cron: '21 9 * * *'  # JST 18:21
    - cron: '55 9 * * *'  # JST 18:55
    - cron: '15 10 * * *'  # JST 19:15
    - cron: '50 10 * * *'  # JST 19:50
    - cron: '41 11 * * *'  # JST 20:41
    - cron: '55 11 * * *'  # JST 20:55
    - cron: '7 12 * * *'  # JST 21:07
    - cron: '39 12 * * *'  # JST 21:39
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore posted URLs cache
        uses: actions/cache@v4
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
          restore-keys: |
            posted-urls-

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}

      - name: Save posted URLs cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: src/posted_urls.json
          key: posted-urls-${{ github.run_id }}
